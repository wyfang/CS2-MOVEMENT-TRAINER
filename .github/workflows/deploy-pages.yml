name: Deploy Multi-Branch to GitHub Pages

on:
  push:
    branches:
      - main
      - feature/2d-movement
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-src

      - name: Checkout feature/2d-movement
        uses: actions/checkout@v4
        with:
          ref: feature/2d-movement
          path: 2d-src

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            main-src/package-lock.json
            2d-src/package-lock.json

      # --- Build main branch ---
      - name: Install dependencies (main)
        run: npm ci
        working-directory: main-src

      - name: Build main
        run: npm run build
        working-directory: main-src
        env:
          VITE_BASE: /counterstrafe-minigame/

      # --- Build 2d-movement branch ---
      - name: Install dependencies (2d)
        run: npm ci
        working-directory: 2d-src

      - name: Build 2d-movement
        run: npm run build
        working-directory: 2d-src
        env:
          VITE_BASE: /counterstrafe-minigame/2d/

      # --- Merge into single site directory ---
      - name: Assemble site
        run: |
          mkdir -p site/2d
          cp -r main-src/dist/* site/
          cp -r 2d-src/dist/* site/2d/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
